# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - Flourish-web-app

env:
  # Must match the App Service name in Azure (used to print VITE_API_URL hint + CLI lookup).
  AZURE_WEBAPP_NAME: Flourish-web-app

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read #This is required for actions/checkout
    defaults:
      run:
        working-directory: backend/flourishbackend/flourishbackend
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build with dotnet
        run: dotnet build --configuration Release

      - name: dotnet publish
        run: dotnet publish -c Release -o "${{env.DOTNET_ROOT}}/myapp"

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_9714C61C7DE34955B40F85A5B80263B2 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_94C930196A1B4ECA8F8D14DC9B670B12 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_99070E9FC7664259AC3E630A045B79DF }}

      # SQLite: the app writes the DB under D:\home\data (Windows) or /home/data (Linux) when WEBSITE_SITE_NAME is set.
      # Optional App Settings: FLUORISH_DB_DIRECTORY (writable folder) or ConnectionStrings__FlourishConnection=Data Source=C:\full\path\app.db
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: 'Production'
          package: .

      # No Azure Portal needed: copy this value into repo secret VITE_API_URL for the Static Web Apps workflow.
      - name: Print API base for frontend (VITE_API_URL)
        shell: bash
        run: |
          HOST="$(az webapp list --query "[?name=='${{ env.AZURE_WEBAPP_NAME }}'].defaultHostName | [0]" -o tsv 2>/dev/null || true)"
          if [ -z "$HOST" ] || [ "$HOST" = "null" ]; then
            LOWER="$(echo '${{ env.AZURE_WEBAPP_NAME }}' | tr '[:upper:]' '[:lower:]')"
            HOST="${LOWER}.azurewebsites.net"
            echo "Could not resolve host via Azure CLI; using default pattern: $HOST"
          fi
          BASE="https://${HOST}/api"
          {
            echo "### API URL for your Static Web App"
            echo "In GitHub: **Settings → Secrets → Actions**, set **VITE_API_URL** to:"
            echo ""
            echo "\`$BASE\`"
            echo ""
            echo "Then re-run the **Azure Static Web Apps** workflow so the SPA rebuilds."
          } >> "$GITHUB_STEP_SUMMARY"
          echo "VITE_API_URL (set this secret on the repo): $BASE"
          
